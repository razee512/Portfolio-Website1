name: Linting Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Debug Stylelint configuration
        run: npx stylelint --print-config "styles/**/*.css"

      - name: Lint HTML files
        run: htmlhint "src/**/*.html"

      - name: Lint CSS files
        run: npx stylelint "styles/**/*.css" --config .stylelintrc.json
